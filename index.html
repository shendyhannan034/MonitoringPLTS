<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Pilih Tampilan Dashboard
    </title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial,sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at top, rgba(0,255,255,0.12), transparent 35%), radial-gradient(circle at bottom, rgba(37,99,235,0.15), transparent 40%), linear-gradient( 135deg, #020617, #071129, #020617 );
            color: white;
        }

        /* CONTAINER */

        .container {
            text-align: center;
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }

        /* LOGO */

        .logo {
            font-size: 90px;
            margin-bottom: 20px;
            animation: pulse 2s infinite alternate;
        }

        /* TITLE */

        .title {
            font-size: 52px;
            font-weight: bold;
            color: cyan;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5), 0 0 20px rgba(0,255,255,0.3);
        }

        /* SUBTITLE */

        .subtitle {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 60px;
        }

        /* BUTTON CONTAINER */

        .button-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* BUTTON */

        .btn {
            width: 240px;
            height: 220px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.35s;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0,255,255,0.08);
            backdrop-filter: blur(12px);
        }

        /* MOBILE */

        .mobile {
            background: linear-gradient( 145deg, rgba(34,197,94,0.35), rgba(21,128,61,0.35) );
            border: 1px solid rgba(34,197,94,0.25);
        }

        /* DESKTOP */

        .desktop {
            background: linear-gradient( 145deg, rgba(37,99,235,0.35), rgba(29,78,216,0.35) );
            border: 1px solid rgba(37,99,235,0.25);
        }

        .btn:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 35px rgba(0,255,255,0.18);
        }

        /* ICON */

        .btn-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        /* TEXT */

        .btn-text {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* FOOTER */

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* ANIMATION */

        @keyframes pulse {

            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        /* MOBILE */

        @media screen and (max-width:768px) {

            .title {
                font-size: 38px;
                line-height: 1.2;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 40px;
            }

            .btn {
                width: 190px;
                height: 180px;
            }

            .btn-icon {
                font-size: 60px;
            }

            .btn-text {
                font-size: 22px;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- LOGO -->

        <div class="logo">
            ⚡
        </div>

        <!-- TITLE -->

        <div class="title">
            SISTEM MONITORING PLTS
        </div>

        <!-- SUBTITLE -->

        <div class="subtitle">

            Pilih tampilan dashboard sesuai perangkat Anda

        </div>

        <!-- BUTTON -->

        <div class="button-group">

            <!-- MOBILE -->

            <button class="btn mobile"
                    onclick="window.location.href='mobile.html'">

                <div class="btn-icon">
                    📱
                </div>

                <div class="btn-text">
                    Mobile View
                </div>

            </button>

            <!-- DESKTOP -->

            <button class="btn desktop"
                    onclick="window.location.href='desktop.html'">

                <div class="btn-icon">
                    💻
                </div>

                <div class="btn-text">
                    Desktop View
                </div>

            </button>

        </div>

        <!-- FOOTER -->

        <div class="footer">

            Politeknik Negeri Padang

        </div>

    </div>

</body>

</html>
